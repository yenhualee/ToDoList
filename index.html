<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>日常流動 | Minimalist MUJI Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --muji-bg: #F5F4F0;
            --muji-text: #4A4A4A;
            --muji-sub: #8C8C8C;
            --muji-accent: #D1C7BD;
            --muji-white: #FFFFFF;
            --muji-card-bg: #FFFFFF;
            --muji-input-bg: #FAF9F6;
            
            --prio-high: #FFF1F0;
            --prio-med: #FFFBEB;
            --prio-low: #F0FDF4;
            --prio-done: #F9FAFB;
            --prio-border: transparent;
        }

        body.dark {
            --muji-bg: #1C1C1E;
            --muji-text: #E5E5E7;
            --muji-sub: #A1A1A6;
            --muji-accent: #BFAE9F;
            --muji-white: #2C2C2E;
            --muji-card-bg: #2C2C2E;
            --muji-input-bg: #3A3A3C;

            --prio-high: #442a2a;
            --prio-med: #443d2a;
            --prio-low: #2a4433;
            --prio-done: #252525;
            --prio-border: rgba(255,255,255,0.05);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--muji-bg);
            color: var(--muji-text);
            -webkit-tap-highlight-color: transparent;
            padding-bottom: env(safe-area-inset-bottom, 20px);
            touch-action: manipulation;
            overflow-x: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .muji-card {
            background: var(--muji-card-bg);
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s;
        }

        /* 滑動容器優化 */
        .swipe-container {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            touch-action: pan-y;
            user-select: none;
        }
        .swipe-bg {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1.5rem;
            background-color: var(--muji-input-bg);
            z-index: 0;
        }
        .todo-content {
            position: relative;
            z-index: 10;
            will-change: transform;
        }
        
        /* 日曆適應性佈局 */
        .calendar-container {
            width: 100%;
            max-width: 300px;
            height: auto;
            min-height: 160px;
            background: var(--muji-card-bg);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            margin: 0 auto;
        }
        .calendar-day {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
        }
        .calendar-day.selected {
            background-color: var(--muji-accent) !important;
            color: white !important;
        }
        .calendar-dot { 
            position: absolute;
            bottom: 4px;
            width: 4px; 
            height: 4px; 
            border-radius: 50%; 
        }

        /* 底部導覽列 - 響應式高度與安全距離 */
        .bottom-nav {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(var(--muji-card-bg-rgb, 255, 255, 255), 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            height: 68px;
            border-radius: 34px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            z-index: 100;
        }
        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--muji-sub);
            transition: all 0.3s ease;
            flex: 1;
        }
        .nav-btn.active { color: var(--muji-text); }
        .nav-btn.active i { color: var(--muji-accent); transform: scale(1.1); }

        .item-high { background-color: var(--prio-high); }
        .item-medium { background-color: var(--prio-med); }
        .item-low { background-color: var(--prio-low); }
        .item-done { background-color: var(--prio-done); opacity: 0.6; }

        .page-view { display: none; }
        .page-view.active { display: block; animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .muji-input {
            background-color: var(--muji-input-bg);
            border: 1px solid transparent;
            border-radius: 14px;
            padding: 10px 14px;
            font-size: 14px;
            color: var(--muji-text);
            outline: none;
            transition: all 0.2s;
        }
        .muji-input:focus { border-color: var(--muji-accent); background-color: var(--muji-white); }

        /* 轉盤容器響應式 */
        .wheel-container {
            position: relative;
            width: 85vw;
            height: 85vw;
            max-width: 320px;
            max-height: 320px;
            margin: 0 auto;
        }
        #wheel {
            width: 100%;
            height: 100%;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .wheel-pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 24px;
            z-index: 30;
            color: var(--muji-accent);
        }

        .category-tab {
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 12px;
            transition: all 0.3s;
            background: var(--muji-input-bg);
            color: var(--muji-sub);
            white-space: nowrap;
        }
        .category-tab.active {
            background: var(--muji-accent);
            color: white;
            box-shadow: 0 4px 15px rgba(209, 199, 189, 0.3);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--muji-accent); border-radius: 10px; }

        @media (min-width: 1024px) {
            body { padding-bottom: 40px; }
            .bottom-nav { left: calc(50% + 175px); } /* 避開側邊欄 */
        }
    </style>
</head>
<body class="light">

    <div class="max-w-screen-xl mx-auto flex flex-col lg:flex-row min-h-screen">
        
        <!-- 左側側邊欄 -->
        <aside class="lg:w-[350px] w-full p-6 lg:fixed lg:h-screen flex flex-col items-center lg:items-start z-30 bg-transparent">
            <div class="mb-8 mt-4 flex items-center justify-between w-full">
                <div>
                    <h1 class="text-2xl font-light tracking-[0.3em] text-inherit">日常・流動</h1>
                    <p class="text-[10px] text-gray-400 tracking-widest uppercase mt-1 italic">Living in the moment</p>
                </div>
                <button onclick="toggleDarkMode()" class="p-3 rounded-full hover:bg-black/5 dark:hover:bg-white/5 transition-colors">
                    <i id="theme-icon" data-lucide="moon" class="w-6 h-6 text-[#D1C7BD]"></i>
                </button>
            </div>

            <!-- 日曆區域 -->
            <div class="calendar-container mb-8 shadow-sm">
                <div class="flex justify-between items-center mb-4 px-1">
                    <span id="calMonth" class="text-xs font-medium opacity-60">2024年 10月</span>
                    <div class="flex gap-1">
                        <button onclick="changeMonth(-1)" class="p-1.5 hover:bg-black/5 dark:hover:bg-white/5 rounded-full"><i data-lucide="chevron-left" class="w-4 h-4 opacity-40"></i></button>
                        <button onclick="changeMonth(1)" class="p-1.5 hover:bg-black/5 dark:hover:bg-white/5 rounded-full"><i data-lucide="chevron-right" class="w-4 h-4 opacity-40"></i></button>
                    </div>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center text-[10px] opacity-30 mb-2 font-light uppercase tracking-tighter">
                    <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
                </div>
                <div id="miniCalendarGrid" class="grid grid-cols-7 gap-1 flex-1"></div>
            </div>

            <div class="hidden lg:block mt-auto pb-12 px-2 text-[11px] opacity-40 leading-relaxed font-light italic">
                保持簡單，讓生活更有餘裕。<br>Simplicity is the ultimate sophistication.
            </div>
        </aside>

        <!-- 右側主內容 -->
        <main class="flex-1 lg:ml-[350px] px-4 md:px-10 lg:px-20 py-10 pb-32">
            <div class="max-w-2xl mx-auto">

                <!-- 待辦清單頁面 -->
                <div id="page-list" class="page-view active">
                    <header class="mb-10 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
                        <h2 class="text-3xl font-light opacity-80" id="listDateTitle">清單內容</h2>
                        <div id="quoteDisplay" class="text-[11px] text-[#D1C7BD] italic text-left sm:text-right max-w-[240px] leading-relaxed transition-opacity duration-500">
                            載入中...
                        </div>
                    </header>

                    <!-- 新增任務卡片 -->
                    <section class="muji-card p-6 mb-10">
                        <div class="flex flex-col gap-6">
                            <div class="flex items-start gap-4">
                                <div id="selectedIconDisplay" class="w-12 h-12 rounded-2xl bg-[var(--muji-input-bg)] flex items-center justify-center text-[#D1C7BD] shadow-inner">
                                    <i data-lucide="plus" class="w-6 h-6"></i>
                                </div>
                                <input id="todoInput" type="text" placeholder="在此日期寫下流動..." 
                                    class="flex-1 bg-transparent border-none focus:ring-0 text-xl font-light placeholder-gray-300 py-2 outline-none">
                            </div>
                            
                            <div class="flex flex-wrap gap-3 px-1">
                                <button onclick="selectIcon('coffee')" class="icon-btn p-2.5 rounded-xl opacity-40 hover:opacity-100 transition-all bg-[var(--muji-input-bg)]" data-icon="coffee"><i data-lucide="coffee" class="w-5 h-5"></i></button>
                                <button onclick="selectIcon('book-open')" class="icon-btn p-2.5 rounded-xl opacity-40 hover:opacity-100 transition-all bg-[var(--muji-input-bg)]" data-icon="book-open"><i data-lucide="book-open" class="w-5 h-5"></i></button>
                                <button onclick="selectIcon('briefcase')" class="icon-btn p-2.5 rounded-xl opacity-40 hover:opacity-100 transition-all bg-[var(--muji-input-bg)]" data-icon="briefcase"><i data-lucide="briefcase" class="w-5 h-5"></i></button>
                                <button onclick="selectIcon('dumbbell')" class="icon-btn p-2.5 rounded-xl opacity-40 hover:opacity-100 transition-all bg-[var(--muji-input-bg)]" data-icon="dumbbell"><i data-lucide="dumbbell" class="w-5 h-5"></i></button>
                                <button onclick="selectIcon('utensils')" class="icon-btn p-2.5 rounded-xl opacity-40 hover:opacity-100 transition-all bg-[var(--muji-input-bg)]" data-icon="utensils"><i data-lucide="utensils" class="w-5 h-5"></i></button>
                            </div>

                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div class="flex flex-col gap-1.5">
                                    <span class="text-[10px] opacity-40 uppercase tracking-[0.2em] ml-1">開始時間</span>
                                    <input type="time" id="addStartTimeInput" class="muji-input w-full">
                                </div>
                                <div class="flex flex-col gap-1.5">
                                    <span class="text-[10px] opacity-40 uppercase tracking-[0.2em] ml-1">結束時間</span>
                                    <input type="time" id="addEndTimeInput" class="muji-input w-full">
                                </div>
                            </div>

                            <div class="flex flex-col sm:flex-row items-center justify-between gap-4 border-t border-black/5 dark:border-white/5 pt-6">
                                <select id="prioritySelect" class="bg-[var(--muji-input-bg)] text-xs px-5 py-3 rounded-full border-none outline-none text-inherit opacity-70 cursor-pointer w-full sm:w-auto">
                                    <option value="low">低優先度 (綠)</option>
                                    <option value="medium" selected>一般事項 (黃)</option>
                                    <option value="high">緊急處理 (紅)</option>
                                </select>
                                <button onclick="addTodo()" class="bg-[#D1C7BD] text-white px-10 py-3 rounded-full text-sm hover:bg-[#BFAE9F] transition-all shadow-md w-full sm:w-auto">
                                    加入日程
                                </button>
                            </div>
                        </div>
                    </section>

                    <div id="todoList" class="space-y-4"></div>
                    
                    <div id="aiPhilosophyCard" class="mt-12 p-8 rounded-[28px] bg-[var(--muji-input-bg)] border border-[#D1C7BD]/20 hidden shadow-sm">
                        <div class="flex items-center gap-3 mb-4 text-[#D1C7BD]">
                            <i data-lucide="sparkles" class="w-5 h-5"></i>
                            <span class="text-xs font-medium tracking-widest uppercase">✨ 簡約生活建議</span>
                        </div>
                        <p id="aiPhilosophyText" class="text-sm opacity-70 font-light leading-relaxed italic"></p>
                    </div>

                    <div id="emptyState" class="hidden text-center py-24 opacity-20">
                        <i data-lucide="wind" class="w-12 h-12 mx-auto mb-4"></i>
                        <p class="text-sm italic tracking-widest">選定的日期尚無流動，享受此刻的留白。</p>
                    </div>
                </div>

                <!-- P人專區頁面 -->
                <div id="page-p-zone" class="page-view">
                    <header class="mb-12 flex flex-col items-center text-center">
                        <h2 class="text-3xl font-light opacity-80">隨興轉盤</h2>
                        <p class="text-xs opacity-40 mt-3 tracking-widest uppercase">Embrace the spontaneity</p>
                        
                        <div class="flex flex-wrap justify-center gap-3 mt-10">
                            <button onclick="switchCategory('food')" id="cat-food" class="category-tab active">飲食美食</button>
                            <button onclick="switchCategory('leisure')" id="cat-leisure" class="category-tab">娛樂放鬆</button>
                            <button onclick="switchCategory('restaurant')" id="cat-restaurant" class="category-tab">口袋餐廳</button>
                            <button onclick="switchCategory('cafe')" id="cat-cafe" class="category-tab">口袋咖啡廳</button>
                        </div>
                    </header>

                    <div class="flex flex-col items-center space-y-12">
                        <div class="wheel-container">
                            <div class="wheel-pointer"><i data-lucide="triangle" class="w-full h-full fill-current rotate-180"></i></div>
                            <svg id="wheel" viewBox="0 0 100 100"></svg>
                        </div>

                        <button onclick="spinWheel()" id="spinBtn" class="bg-[var(--muji-text)] text-[var(--muji-card-bg)] px-20 py-4 rounded-full text-base hover:opacity-90 transition-all flex items-center gap-3 shadow-xl transform active:scale-95">
                            <i data-lucide="play" class="w-5 h-5"></i> 開始旋轉
                        </button>

                        <div id="spinResult" class="text-center min-h-[120px] flex flex-col items-center justify-center w-full px-6">
                            <div id="resultLabel" class="animate-in fade-in slide-in-from-bottom-2 duration-700"></div>
                        </div>

                        <div class="w-full muji-card p-8 border border-black/5 dark:border-white/5 space-y-8">
                            <div>
                                <h4 class="text-[11px] font-medium text-[#D1C7BD] uppercase tracking-widest mb-6">管理選項</h4>
                                <div id="managementInputs" class="flex flex-col gap-3 mb-8">
                                    <input type="text" id="wheelOptionInput" class="muji-input" placeholder="名稱...">
                                    <div id="urlInputContainer" class="hidden">
                                        <input type="url" id="wheelUrlInput" class="muji-input w-full" placeholder="網址 (選填)...">
                                    </div>
                                    <button onclick="addWheelOption()" class="w-full bg-[var(--muji-input-bg)] text-[#D1C7BD] py-3.5 rounded-xl border border-[#D1C7BD]/20 hover:bg-white dark:hover:bg-black transition-colors flex items-center justify-center gap-2 text-sm font-medium">確認新增</button>
                                </div>
                                <div id="optionsList" class="space-y-3 max-h-80 overflow-y-auto pr-1 custom-scrollbar"></div>
                            </div>

                            <div id="visitedSection" class="hidden border-t border-black/5 dark:border-white/5 pt-8">
                                <h4 class="text-[11px] font-medium text-gray-400 uppercase tracking-widest mb-6">已探店</h4>
                                <div id="visitedList" class="space-y-3 max-h-60 overflow-y-auto pr-1 custom-scrollbar opacity-60"></div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- 底部導覽列 -->
    <nav class="bottom-nav">
        <button onclick="switchPage('list')" id="nav-list" class="nav-btn active">
            <i data-lucide="list-todo" class="w-7 h-7"></i>
            <span class="text-[10px] font-medium">日常清單</span>
        </button>
        <button onclick="switchPage('p-zone')" id="nav-p-zone" class="nav-btn">
            <i data-lucide="refresh-cw" class="w-7 h-7"></i>
            <span class="text-[10px] font-medium">隨興轉盤</span>
        </button>
    </nav>

    <!-- 詳情 Modal -->
    <div id="todoModal" class="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/60 backdrop-blur-md hidden" onclick="if(event.target === this) closeModal()">
        <div class="bg-[var(--muji-card-bg)] w-full max-w-md rounded-[36px] shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
            <div class="p-8">
                <div class="flex justify-between items-start mb-8">
                    <h3 id="modalTitleDisplay" class="text-xl font-medium opacity-80">任務詳情</h3>
                    <div class="flex gap-3">
                        <button onclick="breakDownTaskAI()" id="aiBreakdownBtn" class="text-[#D1C7BD] hover:opacity-70 transition-colors p-2" title="AI 智慧分解">
                            <i data-lucide="sparkles" class="w-6 h-6"></i>
                        </button>
                        <button onclick="closeModal()" class="opacity-30 hover:opacity-100 transition-colors p-2"><i data-lucide="x" class="w-6 h-6"></i></button>
                    </div>
                </div>

                <div class="space-y-8">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="flex flex-col gap-1.5">
                            <span class="text-[10px] opacity-40 uppercase tracking-widest ml-1">排定日期</span>
                            <input type="date" id="modalDateInput" class="muji-input w-full">
                        </div>
                        <div class="flex flex-col gap-1.5">
                            <span class="text-[10px] opacity-40 uppercase tracking-widest ml-1">排定時間</span>
                            <input type="time" id="modalTimeInput" class="muji-input w-full">
                        </div>
                    </div>

                    <div class="flex flex-col gap-1.5">
                        <span class="text-[10px] opacity-40 uppercase tracking-widest ml-1">緊急程度</span>
                        <select id="modalPrioritySelect" class="muji-input w-full cursor-pointer">
                            <option value="low">低優先度 (綠)</option>
                            <option value="medium">一般事項 (黃)</option>
                            <option value="high">緊急處理 (紅)</option>
                        </select>
                    </div>

                    <div class="relative flex flex-col gap-1.5">
                        <span class="text-[10px] opacity-40 uppercase tracking-widest ml-1">任務備註</span>
                        <textarea id="modalNote" class="w-full min-h-[160px] muji-input p-5 outline-none resize-none leading-relaxed" placeholder="在此處記錄細節或想法..."></textarea>
                        <div id="aiLoadingIndicator" class="absolute inset-0 bg-black/20 backdrop-blur-[2px] flex items-center justify-center hidden rounded-2xl">
                            <span class="text-sm text-white font-medium animate-pulse">✨ AI 正在拆解任務...</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="bg-[var(--muji-input-bg)] px-8 py-5 flex justify-end">
                <button onclick="saveNote()" class="bg-[#4A4A4A] text-white px-12 py-3 rounded-full text-sm font-medium shadow-md">儲存修改</button>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "";
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";
        
        let todos = JSON.parse(localStorage.getItem('muji_flow_todos')) || [];
        let currentEditId = null;
        let currentCalDate = new Date(); 
        let selectedDate = new Date(); 
        let selectedIcon = 'coffee';

        let activeCategory = 'food';
        let currentRotation = 0;
        let isSpinning = false;

        const quotes = [
            "先活著再說夢想", "躺平也是一種戰略", "成功只是晚點到", 
            "沒天份就多睡一點", "你不尷尬尷尬的是別人", "人生很難但我更懶", 
            "今天也在努力不放棄放空", "夢想很遠鬧鐘很近", "先活過今天再說", 
            "成功很難但吃飯很簡單", "世界很大但床更舒服", "人生苦短先點外送", 
            "今天失敗明天再失敗", "慢慢走，沒關係的", "活著已經很厲害了",
            "保持清醒，或是保持睡眠"
        ];

        function initQuotes() {
            const quoteEl = document.getElementById('quoteDisplay');
            function changeQuote() {
                quoteEl.style.opacity = '0';
                setTimeout(() => {
                    const randomIndex = Math.floor(Math.random() * quotes.length);
                    quoteEl.innerText = quotes[randomIndex];
                    quoteEl.style.opacity = '1';
                }, 500);
            }
            setInterval(changeQuote, 15000); 
            changeQuote();
        }
        
        let pOptions = JSON.parse(localStorage.getItem('muji_p_options_v8')) || {
            food: [{ id: 1, title: '壽司', url: '', pinned: false, isStruck: false }, { id: 2, title: '拉麵', url: '', pinned: false, isStruck: false }],
            leisure: [{ id: 5, title: '讀一本書', url: '', pinned: false, isStruck: false }],
            restaurant: [{ id: 7, title: '鼎泰豐', url: 'https://www.dintaifung.com.tw/', pinned: false, isStruck: false }],
            cafe: [{ id: 8, title: '無印良品 Cafe', url: 'https://www.muji.com/tw/cafemeal/', pinned: false, isStruck: false }]
        };

        function toggleDarkMode() {
            const body = document.body;
            body.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            const isDark = body.classList.contains('dark');
            localStorage.setItem('muji_theme', isDark ? 'dark' : 'light');
            icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
            renderWheel(); 
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('muji_theme') || 'light';
            if (savedTheme === 'dark') document.body.classList.add('dark');
            lucide.createIcons();
        }

        function formatYMD(date) {
            const d = new Date(date);
            return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
        }

        function initAddTimeInputs() {
            const now = new Date();
            document.getElementById('addStartTimeInput').value = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            const end = new Date(now.getTime() + 60 * 60 * 1000);
            document.getElementById('addEndTimeInput').value = `${String(end.getHours()).padStart(2, '0')}:${String(end.getMinutes()).padStart(2, '0')}`;
        }

        function selectCalendarDate(y, m, d) {
            selectedDate = new Date(y, m, d);
            renderCalendar();
            render();
            updateAIPhilosophy();
        }

        function switchCategory(cat) {
            activeCategory = cat;
            document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`cat-${cat}`).classList.add('active');
            document.getElementById('resultLabel').innerHTML = "";
            const urlContainer = document.getElementById('urlInputContainer');
            const visitedSection = document.getElementById('visitedSection');
            if (cat === 'restaurant' || cat === 'cafe') { urlContainer.classList.remove('hidden'); visitedSection.classList.remove('hidden'); }
            else { urlContainer.classList.add('hidden'); visitedSection.classList.add('hidden'); }
            renderWheel();
            renderOptionsList();
        }

        function renderWheel() {
            const svg = document.getElementById('wheel');
            const options = pOptions[activeCategory].filter(opt => !opt.isStruck);
            if (options.length === 0) { svg.innerHTML = `<text x="50" y="50" text-anchor="middle" fill="var(--muji-sub)" style="font-size: 5px;">請新增可用選項</text>`; return; }
            const sliceDeg = 360 / options.length;
            let html = '';
            const isDark = document.body.classList.contains('dark');
            const colors = isDark ? ['#2C2C2E', '#3A3A3C', '#454545', '#1C1C1E'] : ['#F5F4F0', '#EAE8E2', '#FAF9F6', '#F0EEE9'];
            options.forEach((opt, i) => {
                const startDeg = i * sliceDeg, endDeg = (i + 1) * sliceDeg, color = colors[i % colors.length];
                const x1 = 50 + 50 * Math.cos(Math.PI * (startDeg - 90) / 180), y1 = 50 + 50 * Math.sin(Math.PI * (startDeg - 90) / 180);
                const x2 = 50 + 50 * Math.cos(Math.PI * (endDeg - 90) / 180), y2 = 50 + 50 * Math.sin(Math.PI * (endDeg - 90) / 180);
                const largeArcFlag = sliceDeg > 180 ? 1 : 0;
                html += `<g><path d="M50,50 L${x1},${y1} A50,50 0 ${largeArcFlag},1 ${x2},${y2} Z" fill="${color}" stroke="var(--muji-accent)" stroke-width="0.1" /><text x="50" y="12" transform="rotate(${startDeg + sliceDeg/2}, 50, 50)" text-anchor="middle" fill="var(--muji-text)" style="font-size: 3.5px; font-weight: 400;">${opt.title}</text></g>`;
            });
            svg.innerHTML = html;
        }

        function spinWheel() {
            if (isSpinning) return;
            const options = pOptions[activeCategory].filter(opt => !opt.isStruck);
            if (options.length < 2) return;
            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('resultLabel').innerHTML = `<span class="text-sm opacity-50 animate-pulse">命運旋轉中...</span>`;
            const totalDeg = currentRotation + (5 * 360) + Math.floor(Math.random() * 360);
            document.getElementById('wheel').style.transform = `rotate(${totalDeg}deg)`;
            currentRotation = totalDeg;
            setTimeout(() => {
                isSpinning = false;
                document.getElementById('spinBtn').disabled = false;
                const index = Math.floor(((360 - (totalDeg % 360)) % 360) / (360 / options.length));
                showSpinResult(options[index]);
            }, 4000);
        }

        function showSpinResult(winner) {
            const label = document.getElementById('resultLabel');
            label.innerHTML = `
                <div class="flex flex-col items-center gap-4">
                    <span class="text-2xl font-light text-inherit">✨ 今天決定是：<span class="font-medium">${winner.title}</span></span>
                    <div class="flex gap-6">
                        <button onclick="addSpinResultToTodo('${winner.title}')" class="text-xs text-[#D1C7BD] hover:underline flex items-center gap-1.5 font-medium">新增至待辦</button>
                        ${winner.url ? `<a href="${winner.url}" target="_blank" class="text-xs text-[#D1C7BD] hover:underline flex items-center gap-1.5 font-medium">查看網址</a>` : ''}
                    </div>
                </div>`;
            lucide.createIcons();
        }

        function addSpinResultToTodo(title) {
            const icon = (activeCategory === 'food' || activeCategory === 'restaurant') ? 'utensils' : (activeCategory === 'cafe' ? 'coffee' : 'sparkles');
            todos.unshift({ id: Date.now(), title, note: `來自轉盤：${activeCategory}`, priority: 'medium', icon, pinned: false, completed: false, start: `${formatYMD(selectedDate)} ${String(new Date().getHours()).padStart(2,'0')}:${String(new Date().getMinutes()).padStart(2,'0')}`, scheduledEnd: '', end: null });
            save(); switchPage('list');
        }

        function renderOptionsList() {
            const activeContainer = document.getElementById('optionsList'), visitedContainer = document.getElementById('visitedList');
            const allItems = pOptions[activeCategory];
            const activeItems = allItems.filter(o => !o.isStruck).sort((a,b) => b.pinned - a.pinned);
            const visitedItems = allItems.filter(o => o.isStruck);
            
            activeContainer.innerHTML = activeItems.map(opt => `
                <div class="swipe-container" ontouchstart="hTS(event)" ontouchmove="hWheelTM(event, ${opt.id})" ontouchend="hWheelTE(event, ${opt.id})">
                    <div class="swipe-bg">
                        <div class="flex items-center gap-2 text-[#D1C7BD]"><i data-lucide="pin" class="w-5 h-5"></i></div>
                        <div class="flex items-center gap-2 text-red-300"><i data-lucide="trash-2" class="w-5 h-5"></i></div>
                    </div>
                    <div class="muji-card p-4 flex items-center gap-4 todo-content border-l-4 ${opt.pinned ? 'border-[#D1C7BD]' : 'border-transparent'}">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-medium truncate">${opt.title}</span>
                                ${opt.pinned ? '<i data-lucide="pin" class="w-3 h-3 text-[#D1C7BD] fill-current"></i>' : ''}
                            </div>
                        </div>
                        <button onclick="removeWheelOption(${opt.id})" class="p-1 opacity-20 hover:opacity-100 hover:text-red-400 transition-all"><i data-lucide="x" class="w-4 h-4"></i></button>
                    </div>
                </div>`).join('');
                
            visitedContainer.innerHTML = visitedItems.map(opt => `
                <div class="swipe-container" ontouchstart="hTS(event)" ontouchmove="hWheelTM(event, ${opt.id})" ontouchend="hWheelTE(event, ${opt.id})">
                    <div class="swipe-bg">
                        <div class="flex items-center gap-2 text-[#D1C7BD]"><i data-lucide="refresh-cw" class="w-5 h-5"></i></div>
                        <div class="flex items-center gap-2 text-red-300"><i data-lucide="trash-2" class="w-5 h-5"></i></div>
                    </div>
                    <div class="muji-card p-3 flex items-center gap-4 todo-content opacity-50 bg-gray-50/50">
                        <span class="text-sm font-light truncate flex-1">${opt.title}</span>
                        <button onclick="removeWheelOption(${opt.id})" class="p-1 opacity-40 hover:text-red-400"><i data-lucide="x" class="w-4 h-4"></i></button>
                    </div>
                </div>`).join('');
            lucide.createIcons();
        }

        function removeWheelOption(id) {
            const isPocket = (activeCategory === 'restaurant' || activeCategory === 'cafe');
            const optIndex = pOptions[activeCategory].findIndex(o => o.id === id);
            if (optIndex === -1) return;
            if (isPocket && !pOptions[activeCategory][optIndex].isStruck) { 
                pOptions[activeCategory][optIndex].isStruck = true; 
                pOptions[activeCategory][optIndex].pinned = false; 
            } else { 
                pOptions[activeCategory].splice(optIndex, 1); 
            }
            savePOptions();
        }

        function restoreWheelOption(id) {
            const optIndex = pOptions[activeCategory].findIndex(o => o.id === id);
            if (optIndex !== -1) { pOptions[activeCategory][optIndex].isStruck = false; savePOptions(); }
        }

        function toggleWheelPin(id) { pOptions[activeCategory] = pOptions[activeCategory].map(o => o.id === id ? {...o, pinned: !o.pinned} : o); savePOptions(); }

        function addWheelOption() {
            const title = document.getElementById('wheelOptionInput').value.trim(), url = document.getElementById('wheelUrlInput').value.trim();
            if (!title) return;
            pOptions[activeCategory].unshift({ id: Date.now(), title, url, pinned: false, isStruck: false });
            document.getElementById('wheelOptionInput').value = ''; document.getElementById('wheelUrlInput').value = '';
            savePOptions();
        }

        function savePOptions() { localStorage.setItem('muji_p_options_v8', JSON.stringify(pOptions)); renderWheel(); renderOptionsList(); }

        let tSX = 0, tSY = 0;
        function hTS(e) { tSX = e.touches[0].clientX; tSY = e.touches[0].clientY; }
        
        function hWheelTM(e, id) { 
            const dx = e.touches[0].clientX - tSX; 
            if (Math.abs(dx) > Math.abs(e.touches[0].clientY - tSY)) { 
                const content = e.currentTarget.querySelector('.todo-content');
                content.style.transform = `translateX(${Math.max(-100, Math.min(100, dx))}px)`; 
                content.style.transition = 'none';
            } 
        }
        function hWheelTE(e, id) { 
            const content = e.currentTarget.querySelector('.todo-content');
            if (!content) return;
            const x = parseInt(content.style.transform.replace('translateX(', '')) || 0; 
            content.style.transition = 'transform 0.4s cubic-bezier(0.16, 1, 0.3, 1)'; 
            content.style.transform = 'translateX(0)'; 
            if (x > 70) { 
                const opt = pOptions[activeCategory].find(o => o.id === id); 
                if (opt && opt.isStruck) restoreWheelOption(id); else toggleWheelPin(id); 
            } 
            if (x < -70) removeWheelOption(id); 
        }

        async function callGemini(prompt, systemPrompt, retry = 0) {
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: systemPrompt }] } }) });
                if (!res.ok && retry < 3) { await new Promise(r => setTimeout(r, 2000)); return callGemini(prompt, systemPrompt, retry+1); }
                const data = await res.json(); return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
            } catch (err) { return null; }
        }

        async function breakDownTaskAI() {
            if (!currentEditId) return;
            const todo = todos.find(t => t.id === currentEditId);
            const loading = document.getElementById('aiLoadingIndicator');
            loading.classList.remove('hidden');
            const res = await callGemini(`任務：${todo.title}。請分解為 3-5 個極簡步驟。`, "你是一位日系效率專家。請用列表形式呈現。");
            loading.classList.add('hidden');
            if (res) document.getElementById('modalNote').value += "\n\n--- AI 分解建議 ---\n" + res;
        }

        async function updateAIPhilosophy() {
            const card = document.getElementById('aiPhilosophyCard'), textEl = document.getElementById('aiPhilosophyText');
            const dateStr = formatYMD(selectedDate), dayTodos = todos.filter(t => t.start.startsWith(dateStr));
            if (dayTodos.length === 0) return card.classList.add('hidden');
            const res = await callGemini(`今天任務：${dayTodos.map(t => t.title).join('、')}。提供一句日系極簡生活建議。`, "你是一位生活哲學家，語氣溫柔且富有智慧。");
            if (res) { textEl.innerText = res.trim(); card.classList.remove('hidden'); }
        }

        function switchPage(page) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${page}`).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if (document.getElementById(`nav-${page}`)) document.getElementById(`nav-${page}`).classList.add('active');
            lucide.createIcons();
            if (page === 'p-zone') switchCategory(activeCategory);
            if (page === 'list') { render(); updateAIPhilosophy(); }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function save() { localStorage.setItem('muji_flow_todos', JSON.stringify(todos)); render(); renderCalendar(); lucide.createIcons(); }

        function addTodo() {
            const title = document.getElementById('todoInput').value.trim();
            if (!title) return;
            todos.unshift({ id: Date.now(), title, note: '', priority: document.getElementById('prioritySelect').value, icon: selectedIcon, pinned: false, completed: false, start: `${formatYMD(selectedDate)} ${document.getElementById('addStartTimeInput').value}`, scheduledEnd: document.getElementById('addEndTimeInput').value, end: null });
            document.getElementById('todoInput').value = ''; initAddTimeInputs(); save(); updateAIPhilosophy();
        }

        function selectIcon(icon) { 
            selectedIcon = icon; 
            document.querySelectorAll('.icon-btn').forEach(b => b.classList.toggle('opacity-100', b.dataset.icon === icon));
            document.querySelectorAll('.icon-btn').forEach(b => b.classList.toggle('opacity-40', b.dataset.icon !== icon));
            document.getElementById('selectedIconDisplay').innerHTML = `<i data-lucide="${icon}" class="w-6 h-6"></i>`; 
            lucide.createIcons(); 
        }
        function toggleComplete(id) { todos = todos.map(t => t.id === id ? {...t, completed: !t.completed, end: !t.completed ? new Date().toLocaleString() : null} : t); save(); }
        function deleteTodo(id) { todos = todos.filter(t => t.id !== id); save(); }
        function togglePin(id) { todos = todos.map(t => t.id === id ? {...t, pinned: !t.pinned} : t); save(); }

        function openModal(id) {
            currentEditId = id; const t = todos.find(item => item.id === id);
            document.getElementById('modalTitleDisplay').innerText = t.title; 
            document.getElementById('modalNote').value = t.note; 
            document.getElementById('modalPrioritySelect').value = t.priority;
            const parts = t.start.split(' '); 
            if (parts.length === 2) { 
                document.getElementById('modalDateInput').value = parts[0].replace(/\//g, '-'); 
                document.getElementById('modalTimeInput').value = parts[1]; 
            }
            document.getElementById('todoModal').classList.remove('hidden'); 
            lucide.createIcons();
        }
        function closeModal() { document.getElementById('todoModal').classList.add('hidden'); }
        function saveNote() {
            const dv = document.getElementById('modalDateInput').value.replace(/-/g, '/'), tv = document.getElementById('modalTimeInput').value;
            todos = todos.map(t => t.id === currentEditId ? {...t, note: document.getElementById('modalNote').value, priority: document.getElementById('modalPrioritySelect').value, start: `${dv} ${tv}`} : t);
            save(); closeModal();
        }

        function changeMonth(step) { currentCalDate.setMonth(currentCalDate.getMonth() + step); renderCalendar(); }
        
        function renderCalendar() {
            const grid = document.getElementById('miniCalendarGrid'); grid.innerHTML = '';
            const y = currentCalDate.getFullYear(), m = currentCalDate.getMonth(); 
            document.getElementById('calMonth').innerText = `${y}年 ${m + 1}月`;
            const first = new Date(y, m, 1).getDay(), days = new Date(y, m + 1, 0).getDate();
            for (let i = 0; i < first; i++) grid.innerHTML += `<div></div>`;
            for (let d = 1; d <= days; d++) {
                const dateKey = `${y}/${String(m + 1).padStart(2,'0')}/${String(d).padStart(2,'0')}`, isSelected = dateKey === formatYMD(selectedDate), dayTodos = todos.filter(t => t.start.startsWith(dateKey));
                let dot = ''; 
                if (dayTodos.length > 0) { 
                    if (dayTodos.every(t => t.completed)) dot = 'bg-gray-300'; 
                    else if (dayTodos.some(t => t.priority === 'high')) dot = 'bg-red-300'; 
                    else dot = 'bg-[#D1C7BD]'; 
                }
                grid.innerHTML += `<div class="calendar-day text-[11px] font-light ${isSelected ? 'selected' : 'opacity-60'}" onclick="selectCalendarDate(${y}, ${m}, ${d})"><span>${d}</span>${dot ? `<div class="calendar-dot ${dot}"></div>` : ''}</div>`;
            }
        }

        function hTM(e, id) { 
            const dx = e.touches[0].clientX - tSX; 
            if (Math.abs(dx) > Math.abs(e.touches[0].clientY - tSY)) { 
                const content = e.currentTarget.querySelector('.todo-content');
                content.style.transform = `translateX(${Math.max(-100, Math.min(100, dx))}px)`; 
                content.style.transition = 'none';
            } 
        }
        function hTE(e, id) { 
            const content = e.currentTarget.querySelector('.todo-content');
            if (!content) return;
            const x = parseInt(content.style.transform.replace('translateX(', '')) || 0; 
            content.style.transition = 'transform 0.4s cubic-bezier(0.16, 1, 0.3, 1)'; 
            content.style.transform = 'translateX(0)'; 
            if (x > 70) togglePin(id); if (x < -70) deleteTodo(id); 
        }

        function render() {
            const list = document.getElementById('todoList'), dateStr = formatYMD(selectedDate), dp = dateStr.split('/');
            document.getElementById('listDateTitle').innerText = `${dp[1]}月${dp[2]}日的流動`;
            const filtered = todos.filter(t => t.start.startsWith(dateStr));
            if (filtered.length === 0) { document.getElementById('emptyState').classList.remove('hidden'); list.innerHTML = ''; return; }
            document.getElementById('emptyState').classList.add('hidden');
            
            const sorted = [...filtered].sort((a, b) => (b.pinned - a.pinned) || a.start.localeCompare(b.start));

            list.innerHTML = sorted.map(t => {
                let cls = 'bg-white dark:bg-[#2C2C2E]'; 
                if (t.completed) cls = 'item-done'; 
                else if (t.priority === 'high') cls = 'item-high'; 
                else if (t.priority === 'medium') cls = 'item-medium'; 
                else if (t.priority === 'low') cls = 'item-low';
                
                const timeText = t.scheduledEnd ? `${t.start.split(' ')[1]} - ${t.scheduledEnd}` : t.start.split(' ')[1];
                
                return `
                <div class="swipe-container" ontouchstart="hTS(event)" ontouchmove="hTM(event, ${t.id})" ontouchend="hTE(event, ${t.id})">
                    <div class="swipe-bg">
                        <div class="flex items-center gap-2 text-[#D1C7BD]"><i data-lucide="pin" class="w-5 h-5"></i></div>
                        <div class="flex items-center gap-2 text-red-300"><i data-lucide="trash-2" class="w-5 h-5"></i></div>
                    </div>
                    <div class="todo-content muji-card p-5 flex items-center gap-5 ${cls} border-l-4 ${t.pinned ? 'border-[#D1C7BD]' : 'border-transparent'}">
                        <button onclick="toggleComplete(${t.id})" class="flex-shrink-0 transition-transform active:scale-90 ${t.completed ? 'text-[#D1C7BD]' : 'opacity-20'}">
                            <i data-lucide="${t.completed ? 'check-circle' : 'circle'}" class="w-7 h-7"></i>
                        </button>
                        <div class="flex-1 min-w-0 cursor-pointer" onclick="openModal(${t.id})">
                            <div class="flex items-center gap-2">
                                <h4 class="text-base font-medium ${t.completed ? 'line-through opacity-40' : 'opacity-80'} truncate">${t.title}</h4>
                                ${t.pinned ? '<i data-lucide="pin" class="w-3 h-3 text-[#D1C7BD] fill-current"></i>' : ''}
                            </div>
                            <p class="text-[10px] opacity-40 mt-1.5 uppercase tracking-widest font-medium">${timeText} ${t.note ? '● 已備註' : ''}</p>
                        </div>
                        <i data-lucide="${t.icon || 'list'}" class="w-5 h-5 opacity-20"></i>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        window.onload = () => {
            initTheme(); 
            initAddTimeInputs(); 
            initQuotes(); 
            selectIcon('coffee'); 
            switchCategory('food'); 
            renderCalendar(); 
            render();
            updateAIPhilosophy();
        };
    </script>
</body>
</html>
